<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STSWR School Lookup</title>
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>School Lookup</h1>

    <div class="ratings-bar">
      <span id="ratings-info">Ratings: not loaded</span>
      <button id="refresh-ratings-btn" class="file-btn">Refresh</button>
      <label class="file-btn" for="ratings-file">Import</label>
      <input type="file" id="ratings-file" accept=".json" hidden>
    </div>

    <form id="lookup-form">
      <div class="field">
        <label for="street-number">Street Number</label>
        <input type="text" id="street-number" inputmode="numeric" required placeholder="e.g. 100">
      </div>
      <div class="field">
        <label for="street-name">Street Name</label>
        <input type="text" id="street-name" required placeholder="e.g. Victoria">
      </div>
      <div class="field">
        <label for="municipality">Municipality</label>
        <input type="text" id="municipality" required placeholder="e.g. Kitchener" value="Kitchener">
      </div>
      <button type="submit" id="search-btn">Search</button>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <ul id="progress-steps"></ul>
    </div>

    <div id="error" class="hidden"></div>

    <div id="results" class="hidden">
      <h2>Results</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>School Name</th>
              <th>Type</th>
              <th>District</th>
              <th>City</th>
              <th>Rating</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>

    <div id="install-banner" class="hidden">
      <span>Install this app for quick access</span>
      <button id="install-btn">Install</button>
      <button id="install-dismiss" class="dismiss-btn">&times;</button>
    </div>
  </div>

  <script src="js/lookup.js"></script>
  <script src="js/ratings.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
