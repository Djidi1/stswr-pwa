<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STSWR School Lookup</title>
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>School Lookup</h1>

    <div class="ratings-bar">
      <span id="ratings-info">Ratings: not loaded</span>
      <button id="refresh-ratings-btn" class="file-btn">Refresh</button>
    </div>

    <form id="lookup-form">
      <div class="field">
        <label for="address">Address</label>
        <input type="text" id="address" required placeholder="100 Victoria" autocomplete="off">
      </div>
      <div class="field">
        <label for="municipality">Municipality</label>
        <select id="municipality">
          <option value="Kitchener">Kitchener</option>
          <option value="Waterloo">Waterloo</option>
          <option value="Ayr">Ayr</option>
          <option value="Baden">Baden</option>
          <option value="Bloomingdale">Bloomingdale</option>
          <option value="Breslau">Breslau</option>
          <option value="Cambridge">Cambridge</option>
          <option value="Conestogo">Conestogo</option>
          <option value="Crosshill">Crosshill</option>
          <option value="Elmira">Elmira</option>
          <option value="Hawkesville">Hawkesville</option>
          <option value="Heidelberg">Heidelberg</option>
          <option value="Linwood">Linwood</option>
          <option value="Mannheim">Mannheim</option>
          <option value="Maryhill">Maryhill</option>
          <option value="New Dundee">New Dundee</option>
          <option value="New Hamburg">New Hamburg</option>
          <option value="North Dumfries">North Dumfries</option>
          <option value="Petersburg">Petersburg</option>
          <option value="St. Clements">St. Clements</option>
          <option value="St. Jacobs">St. Jacobs</option>
          <option value="Wallenstein">Wallenstein</option>
          <option value="Wellesley">Wellesley</option>
          <option value="West Montrose">West Montrose</option>
          <option value="Wilmot">Wilmot</option>
          <option value="Woolwich">Woolwich</option>
        </select>
      </div>
      <button type="submit" id="search-btn">Search</button>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <ul id="progress-steps"></ul>
    </div>

    <div id="error" class="hidden"></div>

    <div id="results" class="hidden">
      <h2>Results</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>School Name</th>
              <th>Type</th>
              <th>District</th>
              <th>City</th>
              <th>Rating</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>

    <div class="update-bar">
      <button id="update-btn" class="link-btn">Update app</button>
    </div>

    <div id="install-banner" class="hidden">
      <span>Install this app for quick access</span>
      <button id="install-btn">Install</button>
      <button id="install-dismiss" class="dismiss-btn">&times;</button>
    </div>
  </div>

  <script src="js/lookup.js"></script>
  <script src="js/ratings.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
    document.getElementById('update-btn').addEventListener('click', async () => {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.unregister();
      }
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      location.reload();
    });
  </script>
</body>
</html>
