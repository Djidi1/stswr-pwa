<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>School Lookup — Waterloo Region</title>
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h1>School Lookup</h1>
      <div class="header-menu">
        <button id="menu-btn" class="icon-btn" title="Menu" aria-label="Menu" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
        </button>
        <div id="menu-dropdown" class="menu-dropdown hidden">
          <button id="refresh-ratings-btn" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
            Refresh ratings
          </button>
          <button id="update-btn" class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Check for updates
          </button>
        </div>
      </div>
    </div>

    <p class="tagline">Find your assigned schools in Waterloo Region</p>

    <div class="ratings-pill" id="ratings-pill">
      <span class="dot" id="ratings-dot"></span>
      <span id="ratings-info">Loading ratings...</span>
    </div>

    <form id="lookup-form" class="search-form">
      <div class="field">
        <label for="address">Address</label>
        <input type="text" id="address" required placeholder="e.g. 100 Victoria St N" autocomplete="off">
      </div>
      <div class="field">
        <label for="municipality">Municipality</label>
        <select id="municipality">
          <option value="Kitchener">Kitchener</option>
          <option value="Waterloo">Waterloo</option>
          <option value="Cambridge">Cambridge</option>
          <option value="Ayr">Ayr</option>
          <option value="Baden">Baden</option>
          <option value="Bloomingdale">Bloomingdale</option>
          <option value="Breslau">Breslau</option>
          <option value="Conestogo">Conestogo</option>
          <option value="Crosshill">Crosshill</option>
          <option value="Elmira">Elmira</option>
          <option value="Hawkesville">Hawkesville</option>
          <option value="Heidelberg">Heidelberg</option>
          <option value="Linwood">Linwood</option>
          <option value="Mannheim">Mannheim</option>
          <option value="Maryhill">Maryhill</option>
          <option value="New Dundee">New Dundee</option>
          <option value="New Hamburg">New Hamburg</option>
          <option value="North Dumfries">North Dumfries</option>
          <option value="Petersburg">Petersburg</option>
          <option value="St. Clements">St. Clements</option>
          <option value="St. Jacobs">St. Jacobs</option>
          <option value="Wallenstein">Wallenstein</option>
          <option value="Wellesley">Wellesley</option>
          <option value="West Montrose">West Montrose</option>
          <option value="Wilmot">Wilmot</option>
          <option value="Woolwich">Woolwich</option>
        </select>
      </div>
      <button type="submit" id="search-btn" class="search-btn">Search</button>
    </form>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <ul id="progress-steps"></ul>
    </div>

    <div id="error" class="hidden"></div>

    <div id="results" class="hidden">
      <div class="results-header" id="results-header"></div>
      <div class="school-cards" id="results-body"></div>
    </div>

    <div id="update-banner" class="hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      <span>A new version is available</span>
      <button id="update-now-btn">Update</button>
      <button id="update-dismiss" class="dismiss-btn">&times;</button>
    </div>

    <div id="install-banner" class="hidden">
      <span>Install for quick access</span>
      <button id="install-btn">Install</button>
      <button id="install-dismiss" class="dismiss-btn">&times;</button>
    </div>
  </div>

  <script src="js/lookup.js"></script>
  <script src="js/ratings.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function applyUpdate() {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.unregister();
      }
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      location.reload();
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              document.getElementById('update-banner').classList.remove('hidden');
              document.getElementById('menu-btn').classList.add('has-update');
            }
          });
        });
      });
    }

    // Menu toggle
    const menuBtn = document.getElementById('menu-btn');
    const menuDropdown = document.getElementById('menu-dropdown');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = !menuDropdown.classList.contains('hidden');
      menuDropdown.classList.toggle('hidden');
      menuBtn.setAttribute('aria-expanded', !open);
    });

    document.addEventListener('click', () => {
      menuDropdown.classList.add('hidden');
      menuBtn.setAttribute('aria-expanded', 'false');
    });

    menuDropdown.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    document.getElementById('update-btn').addEventListener('click', () => {
      menuDropdown.classList.add('hidden');
      applyUpdate();
    });
    document.getElementById('update-now-btn').addEventListener('click', applyUpdate);
    document.getElementById('update-dismiss').addEventListener('click', () => {
      document.getElementById('update-banner').classList.add('hidden');
    });
  </script>
</body>
</html>
